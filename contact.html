<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="Index.html">My Accounting</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="faq.html">Tax Tips</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<main>
<div class="container py-5">
  <h2 class="text-center mb-4">Contact Me</h2>

  <form class="needs-validation" novalidate>
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" rows="4" required></textarea>
    </div>

    <button class="bg-turquoise btn btn-info">Send Message</button>
  </form>
</div>

<script>
(() => {
  'use strict';
  const forms = document.querySelectorAll('.needs-validation');
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
})();
</script>
</main>
<footer class="custom-footer mt-5">
  <div class="container py-4">
    <div class="row text-center text-md-start">
      <div class="col-md-4 mb-3">
        <h5 class="text-gold">My Accounting</h5>
        <p>Professional and reliable accounting services you can trust.</p>
      </div>
      <div class="col-md-4 mb-3">
        <h6 class="text-gold">Contact</h6>
        <p>Email: info@myaccounting.com</p>
        <p>Phone: 0400 000 000</p>
      </div>
      <div class="col-md-4 mb-3">
        <h6 class="text-gold">Location</h6>
        <p>Perth, WA</p>
      </div>
    </div>
    <div class="text-center pt-3 border-top border-secondary">
      <small>&copy; 2026 My Accounting Business</small>
    </div>
  </div>
</footer>


</body>
</html>
